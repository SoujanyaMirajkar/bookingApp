<ion-header>
  <ion-toolbar>
    <ion-title>Book Appointment</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input label="Your Name" labelPlacement="floating" placeholder="Enter your name" [(ngModel)]="name" name="name">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-label>Select Date</ion-label>
    <ion-datetime presentation="date" [(ngModel)]="date" name="date">
    </ion-datetime>
  </ion-item>

  <ion-button expand="block" (click)="book()" class="ion-margin-top">
    Confirm Booking
  </ion-button>

</ion-content>
